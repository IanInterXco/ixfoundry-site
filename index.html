<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IX Foundry — Bespoke AI Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --orange: #f07400;
      --black: #0a0a0a;
      --off-white: #f0ece4;
      --mid: #1a1a1a;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--black);
      color: var(--off-white);
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 0;
    }

    /* Warm amber glow behind the logo */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(240,116,0,0.10) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -58%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.8rem;
      padding: 2rem;
      animation: fadeUp 1.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-wrap {
      width: min(520px, 88vw);
    }

    .logo-wrap img {
      width: 100%;
      height: auto;
      display: block;
      /* The logo has a black background — blend it away */
      mix-blend-mode: lighten;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
      animation: fadeUp 1.1s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .tagline {
      font-size: clamp(1.15rem, 2.8vw, 1.65rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.03em;
      color: var(--off-white);
      text-align: center;
      line-height: 1.5;
      max-width: 520px;
      animation: fadeUp 1.1s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    footer {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(240,236,228,0.22);
      z-index: 1;
      animation: fadeUp 1.1s 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    footer a {
      color: inherit;
      text-decoration: none;
    }

    footer a:hover {
      color: var(--orange);
      transition: color 0.3s;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo-wrap">
      <img src="InterXFoundry_transparent.png" alt="Intersection X Foundry" />
    </div>
    <div class="divider"></div>
    <p class="tagline">Building bespoke AI solutions for ambitious businesses.</p>
  </main>

  <footer>
    <a href="https://ixfoundry.co">ixfoundry.co</a>
  </footer>
</body>
</html>
